global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "data-ingestion"
    static_configs:
      - targets: ["data-ingestion:9090"]

  - job_name: "signal-generation"
    static_configs:
      - targets: ["signal-generation:9090"]

  - job_name: "ml-model"
    static_configs:
      - targets: ["ml-model:9090"]

  - job_name: "risk-management"
    static_configs:
      - targets: ["risk-management:9090"]

  - job_name: "execution"
    static_configs:
      - targets: ["execution:9090"]

  - job_name: "api"
    static_configs:
      - targets: ["api:9090"]

  - job_name: "notifications"
    static_configs:
      - targets: ["notifications:9090"]
